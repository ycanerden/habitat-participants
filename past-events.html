<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Habitat] — Past Events</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f2eb;
    --surface: #ede9df;
    --border: #d8d3c8;
    --accent: #3a6e00;
    --accent-dim: rgba(58, 110, 0, 0.08);
    --text: #1a1a16;
    --muted: #8a8578;
    --tag-bg: #eae6dd;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }
  /* Top nav */
  .topnav {
    position: relative;
    z-index: 2;
    padding: 14px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topnav-brand {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
  }
  .topnav-link {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .topnav-link:hover { color: var(--accent); }
  header {
    position: relative;
    z-index: 1;
    padding: 60px 48px 40px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  h1 {
    font-size: clamp(42px, 6vw, 80px);
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }
  .subhead {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 16px;
    text-transform: uppercase;
  }
  /* Event list */
  .event-list {
    position: relative;
    z-index: 1;
    padding: 0 48px;
  }
  .event-item {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 32px;
    padding: 36px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    animation: fadeUp 0.4s ease both;
  }
  .event-item:hover .event-name {
    color: var(--accent);
  }
  .event-item:hover .event-arrow {
    transform: translateX(4px);
    color: var(--accent);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .event-left {
    display: flex;
    align-items: baseline;
    gap: 24px;
    flex-wrap: wrap;
  }
  .event-date {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    min-width: 120px;
  }
  .event-name {
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.01em;
    transition: color 0.15s;
  }
  .event-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .event-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .event-count {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .event-arrow {
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.15s, color 0.15s;
  }
  .upcoming-label {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(58, 110, 0, 0.25);
    padding: 3px 8px;
    margin-left: 12px;
    vertical-align: middle;
  }
  footer {
    position: relative;
    z-index: 1;
    padding: 32px 48px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
  }
  @media (max-width: 600px) {
    .topnav, header, .event-list, footer { padding-left: 24px; padding-right: 24px; }
    .event-item { flex-direction: column; gap: 12px; }
    .event-name { font-size: 22px; }
  }
</style>
</head>
<body>
<nav class="topnav">
  <a href="/" class="topnav-brand">[Habitat] Participants</a>
  <a href="/" class="topnav-link">← Latest event</a>
</nav>
<header>
  <div class="logo">[Habitat] ✦ Events</div>
  <h1>Past<br><em>evenings</em></h1>
  <p class="subhead">Every [Habitat] evening, city by city</p>
</header>
<div class="event-list">

  <a href="/" class="event-item">
    <div class="event-left">
      <div class="event-date">Mar 2026</div>
      <div>
        <div class="event-name">Leuven <span class="upcoming-label">Latest</span></div>
        <div class="event-meta">Habitat Evening — Leuven</div>
      </div>
    </div>
    <div class="event-right">
      <span class="event-count">24 participants</span>
      <span class="event-arrow">→</span>
    </div>
  </a>

  <!-- Add new events above this line -->

</div>
<footer>
  <span>[Habitat] Participants</span>
  <span>Only participants who opted in are shown</span>
</footer>
</body>
</html>
